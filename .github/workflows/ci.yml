name: CI

on:
  push:
  pull_request:

jobs:
  r-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install test dependencies
        run: |
          Rscript -e "install.packages(c('testthat', 'devtools'))"
          Rscript -e "devtools::load_all()"

      - name: Run unit tests
        run: |
          Rscript -e "testthat::test_file('tests/testthat/test-*.R')"

      - name: Run smoke simulation
        run: |
          Rscript R/run_smoke_simulation.R
