name: CI

on:
  push:
  pull_request:

jobs:
  r-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove broken third-party apt sources
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libuv1-dev

      - name: Install test dependencies
        run: |
          Rscript -e "install.packages(c('testthat'))"

      - name: Run unit tests
        run: |
          Rscript -e "testthat::test_dir('tests/testthat')"
      
      - name: Run smoke simulation
        run: |
          Rscript R/run_smoke_simulation.R
