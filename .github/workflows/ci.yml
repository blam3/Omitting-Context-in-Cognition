name: CI

on:
  push:
  pull_request:

jobs:
  r-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install test dependencies
        run: |
          Rscript -e "install.packages(c('testthat', 'devtools'))"
          Rscript -e "if (file.exists('DESCRIPTION')) message('DESCRIPTION found, will load package') else message('No DESCRIPTION: skipping devtools::load_all()')"

      - name: Run unit tests
        run: |
          Rscript -e "devtools::load_all(); testthat::test_dir('tests/testthat')"
      
      - name: Run smoke simulation
        run: |
          Rscript R/run_smoke_simulation.R
